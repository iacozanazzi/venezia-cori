<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- stripe alta arancio/verde -->
  <rect x="0" y="0" width="660" height="14" fill="#f47b20"/>
  <rect x="660" y="0" width="540" height="14" fill="#157a43"/>
  <!-- watermark VE blades -->
  <g opacity="0.16">
    <polygon points="760,170 1080,170 1000,490 680,490" fill="#f47b20"/>
    <polygon points="1120,170 1460,170 1380,490 1040,490" fill="#157a43"/>
  </g>
  <!-- logo blades -->
  <g transform="translate(84,96)">
    <polygon points="0,0 96,0 72,96 -24,96" fill="#f47b20" transform="translate(24,0)"/>
    <polygon points="132,0 236,0 212,96 108,96" fill="#157a43"/>
  </g>
  <text x="84" y="330" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="104" font-weight="900" fill="#f4f3f0" letter-spacing="2">VENEZIA CORI</text>
  <text x="84" y="412" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#f47b20">I cori che fanno tremare lo stadio</text>
  <text x="84" y="478" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#9b9a96">Cerca, filtra e salva i cori della curva arancioverde</text>
  <!-- stripe bassa -->
  <rect x="0" y="616" width="660" height="14" fill="#157a43"/>
  <rect x="660" y="616" width="540" height="14" fill="#f47b20"/>
</svg>
