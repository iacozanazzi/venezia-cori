<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · Venezia Cori</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a0a'/%3E%3Cpolygon points='14,26 46,26 38,58 6,58' fill='%23f47b20'/%3E%3Cpolygon points='52,26 86,26 78,58 44,58' fill='%23157a43'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="brand-stripe"></div>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo" aria-label="Torna al sito">
        <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="6,24 44,24 35,56 -3,56" fill="#f47b20"/>
          <polygon points="52,24 90,24 81,56 43,56" fill="#157a43"/>
          <polygon points="6,64 38,64 31,92 -1,92" fill="#9a8456"/>
          <polygon points="46,64 88,64 81,92 39,92" fill="#9a8456"/>
        </svg>
        <span class="logo-text">VENEZIA <span>CORI</span></span>
      </a>
      <div class="header-right admin-tag">Admin</div>
      <button id="logout-btn" class="logout-btn" hidden>Esci</button>
    </div>
  </header>

  <!-- ── Login ── -->
  <section class="admin-login" id="login-view" hidden>
    <div class="login-card">
      <h1>Area admin</h1>
      <p class="login-sub">Accedi per moderare proposte di cori e video.</p>
      <form id="login-form">
        <label>Email<input type="email" name="email" required autocomplete="username"></label>
        <label>Password<input type="password" name="password" required autocomplete="current-password"></label>
        <button type="submit" class="btn-primary">Accedi</button>
        <p class="login-err" id="login-err" hidden></p>
      </form>
    </div>
  </section>

  <!-- ── Demo notice (Supabase non configurato) ── -->
  <section class="admin-demo" id="demo-view" hidden>
    <div class="login-card">
      <h1>Database non collegato</h1>
      <p class="login-sub">La pagina admin funziona solo con Supabase configurato.
      Apri <code>js/supabase-config.js</code> e incolla URL e chiave del progetto, poi ricarica.
      Vedi <code>SETUP.md</code> per i passaggi.</p>
    </div>
  </section>

  <!-- ── Dashboard ── -->
  <main class="admin-main" id="dashboard-view" hidden>
    <nav class="admin-tabs">
      <button class="admin-tab active" data-tab="chants">Proposte cori <span class="tab-count" id="cnt-chants">0</span></button>
      <button class="admin-tab" data-tab="media">Proposte video <span class="tab-count" id="cnt-media">0</span></button>
      <button class="admin-tab" data-tab="manage">Gestione</button>
      <button class="admin-tab" data-tab="merch">Merch</button>
    </nav>

    <section class="admin-panel" id="panel-chants"></section>
    <section class="admin-panel" id="panel-media" hidden></section>
    <section class="admin-panel" id="panel-manage" hidden></section>
    <section class="admin-panel" id="panel-merch" hidden></section>
  </main>

  <div class="toast" id="toast" hidden></div>

  <script src="js/vendor/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/chants-data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
